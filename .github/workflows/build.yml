name: Build Blicsa Executables

on:
  push:
    tags:
      - 'v*' # Dispara quando você cria uma tag de release (ex: v1.0.0)

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: Blicsa-Linux
          - os: windows-latest
            artifact_name: Blicsa.exe
          - os: macos-latest
            artifact_name: Blicsa.app

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter matplotlib networkx plotly scipy pandas jinja2 wordcloud groq tkinterdnd2 pyinstaller

      - name: Run PyInstaller
        run: |
          pyinstaller --noconsole --onefile --name="Blicsa" --collect-all customtkinter --collect-all tkinterdnd2 main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/Blicsa*
