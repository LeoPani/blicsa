[pytest]
# Markers da suíte de busca (níveis 1 e 2).
markers =
    live: testes que batem nas APIs reais (OpenAlex/Crossref/PubMed). Excluídos por
          padrao (rede + rate limits). Rodar com: pytest -m live

# Exclusão padrão dos testes 'live'. A linha de comando sobrepõe:
#   pytest -m live      -> roda SÓ os live
#   pytest -m "live or not live"  -> roda todos
addopts = -m "not live"

testpaths = tests
