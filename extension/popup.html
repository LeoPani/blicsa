<!DOCTYPE html>
<html>
<head>
    <title>Blicsa Extension</title>
    <style>
        body { width: 300px; padding: 10px; font-family: sans-serif; }
        .metadata-section { margin-bottom: 15px; }
        .btn { padding: 8px 12px; background-color: #4CAF50; color: white; border: none; cursor: pointer; width: 100%; border-radius: 4px; }
        .btn:hover { background-color: #45a049; }
        .btn:disabled { background-color: #cccccc; cursor: not-allowed; }
        #status { margin-top: 10px; font-size: 0.9em; color: #555; }
        .success { color: green !important; }
        .error { color: red !important; }
        input[type="text"] { width: 95%; padding: 5px; margin-bottom: 5px; }
    </style>
</head>
<body>
    <h3>Add to Blicsa Corpus</h3>
    
    <div class="metadata-section">
        <label>Title:</label>
        <input type="text" id="title" readonly />
        <label>DOI:</label>
        <input type="text" id="doi" readonly />
        <label>Authors:</label>
        <input type="text" id="authors" readonly />
    </div>

    <button id="addBtn" class="btn" disabled>Detecting...</button>
    
    <div id="status"></div>

    <hr>
    <a href="options.html" target="_blank" style="font-size: 0.8em;">Configure Bridge Server</a>

    <script src="popup.js"></script>
</body>
</html>
