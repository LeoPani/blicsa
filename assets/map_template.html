<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blicsa - Interactive Map</title>
  <style>
    /* Local-first: sem @import de fonts remotas. Stack de sistema com Inter
       quando instalada, caindo para Archivo/San Francisco/Segoe/Roboto. */
    body { margin: 0; padding: 0; background-color: #F6F4EE; font-family: 'Inter', 'Archivo', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; overflow: hidden; }
    #container { width: 100vw; height: 100vh; }
    #ui {
        position: absolute; top: 20px; left: 20px; z-index: 10;
        background: #ffffff; padding: 16px; border: 2px solid #141414;
        border-radius: 0; width: 260px; box-sizing: border-box;
    }
    #ui h2 { margin: 0 0 12px 0; font-size: 18px; color: #141414; font-weight: 600; }
    input[type=text] {
        width: 100%; padding: 8px; box-sizing: border-box; margin-bottom: 12px;
        border: 2px solid #141414; border-radius: 0; font-family: inherit;
    }
    button {
        padding: 8px 12px; background: #DF3117; color: white;
        border: 2px solid #141414; border-radius: 0; cursor: pointer;
        font-weight: 600; width: 100%; margin-bottom: 8px; font-family: inherit;
    }
    button:hover { background: #b82611; }
    button.secondary { background: #1E4DA0; }
    button.secondary:hover { background: #153773; }
    .clusters { margin-top: 10px; max-height: 200px; overflow-y: auto; font-size: 13px; }
    .cluster-item { display: flex; align-items: center; margin-bottom: 4px; cursor: pointer; }
    .cluster-color { width: 12px; height: 12px; border: 1px solid #141414; margin-right: 8px; }
  </style>
</head>
<body>
  <div id="ui">
    <h2 id="map-title">Mapping</h2>
    <input type="text" id="search" placeholder="Search term...">
    <button id="reset-btn">Reset View</button>
    <button id="export-btn" class="secondary">Export PNG</button>

    <div id="clusters-title" style="margin-top: 16px; font-weight: 600; font-size: 14px;">Clusters</div>
    <div id="clusters" class="clusters"></div>
  </div>
  <div id="container"></div>

  <!-- Vendors locais (graphology + sigma), depois a lógica do mapa. Sem rede. -->
  <script src="vendor/blicsa-vendor.min.js"></script>
  <script src="map.js"></script>
</body>
</html>
