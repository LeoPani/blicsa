<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Blicsa v4 animated: the structure draws itself, rooms light up,
       nodes pop at the intersections, the big node... just blinks. -->
  <style>
    .line { stroke-dasharray: 1300; stroke-dashoffset: 1300;
            animation: draw .6s cubic-bezier(.65,0,.35,1) forwards; }
    .l1{animation-delay:0s;animation-duration:.8s} .l2{animation-delay:.15s}
    .l3{animation-delay:.30s} .l4{animation-delay:.25s} .l5{animation-delay:.38s} .l6{animation-delay:.46s}
    .cell { transform-box: fill-box; transform-origin: 0 0; transform: scale(0);
            animation: snap .4s cubic-bezier(.2,1.2,.3,1) forwards; }
    .c1{animation-delay:.62s} .c2{animation-delay:.76s} .c3{animation-delay:.90s}
    .node { transform-box: fill-box; transform-origin: center; transform: scale(0);
            animation: pop .45s cubic-bezier(.2,1.6,.3,1) forwards; }
    .n2{animation-delay:1.15s} .n3{animation-delay:1.25s} .n4{animation-delay:1.35s}
    .wink { transform-box: fill-box; transform-origin: center; transform: scale(0);
            animation: pop .45s cubic-bezier(.2,1.6,.3,1) 1.05s forwards,
                       blink 4.5s ease-in-out 2.4s infinite; }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    @keyframes snap { to { transform: scale(1); } }
    @keyframes pop  { to { transform: scale(1); } }
    @keyframes blink { 0%,7%,100% { transform: scaleY(1) scaleX(1); }
                       3.5% { transform: scaleY(.12) scaleX(1.05); } }
    @media (prefers-reduced-motion: reduce) {
      .line { stroke-dashoffset: 0; animation: none; }
      .cell,.node,.wink { transform: scale(1); animation: none; }
    }
  </style>

  <rect x="0" y="0" width="512" height="512" rx="60" fill="#F6F4EE"/>

  <g>
    <rect class="cell c1" x="156" y="72"  width="96"  height="88"  fill="#DF3117"/>
    <rect class="cell c2" x="252" y="268" width="104" height="92"  fill="#1E4DA0"/>
    <rect class="cell c3" x="156" y="360" width="96"  height="88"  fill="#F5BE00"/>
  </g>

  <g stroke="#141414" stroke-width="16" stroke-linecap="square" fill="none">
    <rect class="line l1" x="156" y="72" width="200" height="376"/>
    <line class="line l2" x1="252" y1="72"  x2="252" y2="448"/>
    <line class="line l3" x1="312" y1="160" x2="312" y2="268"/>
    <line class="line l4" x1="156" y1="160" x2="356" y2="160"/>
    <line class="line l5" x1="156" y1="268" x2="356" y2="268"/>
    <line class="line l6" x1="252" y1="360" x2="356" y2="360"/>
  </g>

  <g fill="#141414" stroke="#F6F4EE" stroke-width="9">
    <circle class="wink"    cx="252" cy="160" r="31"/>
    <circle class="node n2" cx="312" cy="268" r="21"/>
    <circle class="node n3" cx="252" cy="360" r="14"/>
    <circle class="node n4" cx="312" cy="160" r="10"/>
  </g>
</svg>
