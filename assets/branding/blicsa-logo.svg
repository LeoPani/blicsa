<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Blicsa v4 — the institute as a neoplastic tower.
       v1's grammar (ink grid, primary cells, halo nodes at intersections)
       reorganized into a vertical slab: floors and rooms, three lit,
       the structure doubling as a citation network. just blink. -->
  <rect x="0" y="0" width="512" height="512" rx="60" fill="#F6F4EE"/>

  <!-- lit rooms (under the structure) -->
  <rect x="156" y="72"  width="96"  height="88"  fill="#DF3117"/>
  <rect x="252" y="268" width="104" height="92"  fill="#1E4DA0"/>
  <rect x="156" y="360" width="96"  height="88"  fill="#F5BE00"/>

  <!-- structure: frame, floors, columns -->
  <g stroke="#141414" stroke-width="16" stroke-linecap="square" fill="none">
    <rect x="156" y="72" width="200" height="376"/>
    <line x1="252" y1="72"  x2="252" y2="448"/>
    <line x1="312" y1="160" x2="312" y2="268"/>
    <line x1="156" y1="160" x2="356" y2="160"/>
    <line x1="156" y1="268" x2="356" y2="268"/>
    <line x1="252" y1="360" x2="356" y2="360"/>
  </g>

  <!-- nodes at structural intersections -->
  <g fill="#141414" stroke="#F6F4EE" stroke-width="9">
    <circle cx="252" cy="160" r="31"/>
    <circle cx="312" cy="268" r="21"/>
    <circle cx="252" cy="360" r="14"/>
    <circle cx="312" cy="160" r="10"/>
  </g>
</svg>
